# INMYHEART — Docker Compose (полное руководство: DOCKER.md)
# Сервисы: index (один раз) → api → bot
# Данные: ./data на хосте (bind mount), не named volume — меньше проблем с правами Chroma.

name: inmyheart

x-app-env: &app-env
  SOURCE_DIR: /app/source
  CHROMA_PERSIST_DIR: /app/data/chroma
  DIALOG_DB_PATH: /app/data/inmyheart.db

x-app-volumes: &app-volumes
  - ./data:/app/data

services:
  index:
    build: .
    image: inmyheart-assistant:latest
    container_name: inmyheart-index
    command: ["python", "scripts/index_knowledge_base.py", "--reset"]
    env_file:
      - .env
    environment:
      <<: *app-env
    volumes: *app-volumes
    restart: "no"

  api:
    build: .
    image: inmyheart-assistant:latest
    container_name: inmyheart-api
    command: ["python", "scripts/run_api.py"]
    env_file:
      - .env
    environment:
      <<: *app-env
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes: *app-volumes
    depends_on:
      index:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=8); d=json.loads(r.read()); exit(0 if d.get('indexed_chunks', 0) > 0 else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  bot:
    build: .
    image: inmyheart-assistant:latest
    container_name: inmyheart-bot
    command: ["python", "scripts/telegram_bot.py"]
    env_file:
      - .env
    environment:
      <<: *app-env
    volumes: *app-volumes
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
